<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iRequest – Update Password</title>
  <link rel="icon" href="/static/assets/iRlogo.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: url('/static/assets/NC_Facade.jpg') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 0;
    }
    .overlay-container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.12);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 420px;
      width: 92%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
    }
    .logo-container { text-align: center; margin-bottom: 24px; }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid rgba(255, 215, 0, 0.8);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .title {
      color: #fff;
      font-size: 26px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.9);
      font-size: 15px;
      text-align: center;
      margin-bottom: 24px;
    }
    #errorMessage {
      color: #ff8a80;
      font-size: 13px;
      text-align: center;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: rgba(255, 0, 0, 0.15);
      border-radius: 8px;
      display: none;
    }
    .password-label {
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      margin-bottom: 6px;
      display: block;
      font-weight: 500;
    }
    .password-input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }
    .password-input:focus {
      border-color: #FFD700;
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
      background: #fff;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #28a745, #218838);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 8px;
    }
    .submit-btn:hover {
      background: linear-gradient(135deg, #218838, #1e7e34);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #FFD700; }
  </style>
  <link rel="icon" href="/static/assets/nclogo.png">
  <meta name="color-scheme" content="light only">
</head>
<body>
  <div class="overlay-container">
    <div class="logo-container">
      <div class="logo">
        <img src="/static/assets/nclogo.png" alt="Norzagaray College Logo">
      </div>
    </div>
    <h1 class="title">Update Password</h1>
    <p class="subtitle">Choose your new password</p>
    <p id="errorMessage"></p>
    <form method="POST" action="/update-password" id="updateForm">
      <label class="password-label" for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" class="password-input" placeholder="Enter new password" minlength="6" required>
      <label class="password-label" for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" class="password-input" placeholder="Confirm new password" minlength="6" required>
      <button type="submit" class="submit-btn">Update Password</button>
    </form>
    <a href="/login.html" class="back-link">← Back to Login</a>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var errorMsg = params.get('error');
      if (errorMsg) {
        var el = document.getElementById('errorMessage');
        el.textContent = decodeURIComponent(errorMsg);
        el.style.display = 'block';
      }
    })();
    document.getElementById('updateForm').addEventListener('submit', function(e) {
      var p1 = document.getElementById('new_password').value;
      var p2 = document.getElementById('confirm_password').value;
      if (p1.length < 6) {
        e.preventDefault();
        alert('Password must be at least 6 characters.');
        return;
      }
      if (p1 !== p2) {
        e.preventDefault();
        alert('Passwords do not match.');
      }
    });
  </script>
</body>
</html>
