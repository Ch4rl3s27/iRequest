<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iRequest</title>
  <link rel="icon" href="/static/assets/iRlogo.png" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: url('/static/assets/NC_Facade.jpg') no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 0;
    }
    
    .overlay-container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.12);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 440px;
      width: 92%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid rgba(255, 215, 0, 0.8);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .title {
      color: #fff;
      font-size: 26px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }
    
    .subtitle {
      color: rgba(255, 255, 255, 0.9);
      font-size: 15px;
      text-align: center;
      margin-bottom: 16px;
    }
    
    .instruction {
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.45;
    }
    
    .email-highlight {
      color: #FFD700;
      font-weight: 600;
    }
    
    #errorMessage {
      color: #ff8a80;
      font-size: 13px;
      text-align: center;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: rgba(255, 0, 0, 0.15);
      border-radius: 8px;
      display: none;
    }
    
    .otp-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    
    .otp-input {
      width: 48px;
      height: 52px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.9);
      text-align: center;
      font-size: 20px;
      font-weight: 600;
      color: #333;
      outline: none;
      transition: all 0.2s ease;
    }
    
    .otp-input:focus {
      border-color: #FFD700;
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.25);
      background: #fff;
    }
    
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FFD700, #F0C000);
      color: #222;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 8px;
    }
    
    .submit-btn:hover {
      background: linear-gradient(135deg, #FFC107, #E6B000);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
    }
    
    .submit-btn:disabled {
      background: #666;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .hidden {
      display: none;
    }
    
    .password-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .password-input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }
    
    .password-input:focus {
      border-color: #FFD700;
      box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
      background: #fff;
    }
    
    .password-label {
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      margin-bottom: 6px;
      display: block;
      font-weight: 500;
    }
    
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #FFD700;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="/static/assets/nclogo.png">
  <meta name="color-scheme" content="light only">
</head>
<body>
  <div class="overlay-container">
    <div class="logo-container">
      <div class="logo">
        <img src="/static/assets/nclogo.png" alt="Norzagaray College Logo">
      </div>
    </div>
    
    <h1 class="title">Reset Password</h1>
    <p class="subtitle">OTP Verification</p>
    <p class="instruction">Enter the 6-digit code sent to <span class="email-highlight" id="userEmail">user@example.com</span></p>
    <p id="errorMessage"></p>
    
    <form method="POST" action="/verify-reset-otp" id="resetForm">
      <input type="hidden" name="email" id="formEmail" value="">
      <div class="otp-container">
        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" required>
      </div>
      
      <input type="hidden" name="otp" id="otpValue">
      
      <button type="submit" class="submit-btn" id="submitBtn">Verify OTP</button>
    </form>
    <a href="/login.html" class="back-link">← Back to Login</a>
  </div>

  <script>
    // Get email from URL parameter or set default
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || 'user@example.com';
    document.getElementById('userEmail').textContent = email;
    document.getElementById('formEmail').value = email;
    var errorMsg = urlParams.get('error');
    if (errorMsg) {
      var el = document.getElementById('errorMessage');
      el.textContent = decodeURIComponent(errorMsg);
      el.style.display = 'block';
    }
    
    // OTP input handling
    const otpInputs = document.querySelectorAll('.otp-input');
    const otpValue = document.getElementById('otpValue');
    const resetForm = document.getElementById('resetForm');

    otpInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const value = e.target.value;
        if (!/^\d$/.test(value)) {
          e.target.value = '';
          return;
        }
        if (value && index < otpInputs.length - 1) otpInputs[index + 1].focus();
        otpValue.value = Array.from(otpInputs).map(i => i.value).join('');
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) otpInputs[index - 1].focus();
      });
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pastedData = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
        pastedData.split('').forEach((digit, i) => { if (otpInputs[i]) otpInputs[i].value = digit; });
        otpValue.value = Array.from(otpInputs).map(i => i.value).join('');
      });
    });

    resetForm.addEventListener('submit', function(e) {
      var otp = otpValue.value;
      if (!otp || otp.length !== 6) {
        e.preventDefault();
        alert('Please enter the 6-digit code from your email.');
      }
    });
  </script>
</body>
</html>
